name: build

on:
  push:
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Build the same dev image used locally (cc65 + z88dk). This step alone
      # verifies both toolchains install correctly.
      - name: Build dev image (cc65 + z88dk)
        run: docker build -t ur-dev .

      - name: Verify toolchains
        run: |
          docker run --rm ur-dev sh -c 'cc65 --version; cl65 --version || true'
          docker run --rm ur-dev sh -c 'zcc 2>&1 | head -1 || true'

      # The key portability gate: src/common must compile/run on the host C
      # compiler (and, via the platform builds below, on BOTH retro toolchains).
      - name: Host unit tests (src/common)
        run: docker run --rm -v "$PWD":/src ur-dev make test

      - name: Core compiles on both toolchains (cc65 + z88dk)
        run: docker run --rm -v "$PWD":/src ur-dev make core-check

      - name: Build all platforms
        run: docker run --rm -v "$PWD":/src ur-dev make all

      # The bonus console/handheld ports (not in `make all`) — keeps them from
      # rotting and covers their extra build tools (e.g. perl for the GB CGB patch).
      - name: Build console/handheld ports (5200, SMS, Game Gear, GB, NES, ColecoVision)
        run: docker run --rm -v "$PWD":/src ur-dev make a5200 sms gamegear gb nes coleco

      # The C64/Apple II default builds are local-only; also compile their FujiNet
      # online variants (link fujinet-lib + the network code path) so they can't rot.
      - name: Build C64 FujiNet online variant
        run: docker run --rm -v "$PWD":/src ur-dev make c64 ONLINE=1

      - name: Build Apple II FujiNet online variant
        run: docker run --rm -v "$PWD":/src ur-dev make apple2 ONLINE=1

      # The Apple II also has a double-hi-res colour board (enhanced //e).
      - name: Build Apple II double-hi-res variant
        run: docker run --rm -v "$PWD":/src ur-dev make apple2 DHGR=1

      # TODO: once fujinet-lib is wired into real builds, add a cached
      # `make deps` step and assert the produced .xex/.dsk/.prg/.po artifacts.

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Vet, test and build the game server
        working-directory: server
        run: |
          go vet ./...
          go test ./...
          go build ./...

      # End-to-end: the Go server + two C net clients (real proto.c/ur.c codec)
      # play a full server-authoritative game over TCP — the online path without
      # needing FujiNet. (Runner has go + gcc + make.)
      - name: Online end-to-end (server + two net clients)
        run: make test-online
