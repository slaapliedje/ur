# ProDOS-8 SYSTEM program that uses double-hi-res PAGE 2 ($4000-$5FFF).
#
# Loads at $2000 like a normal SYSTEM file (clean ProDOS boot). STARTUP sits at
# $2000; CODE is pinned at $6000, so the $2034-$5FFF gap (which contains the DHGR
# page-2 bitmap at $4000-$5FFF) is left as zero-fill and free for graphics at run
# time. One MAIN region keeps __MAIN_START__/__MAIN_LAST__ defined for the EXEHDR.

SYMBOLS {
    __EXEHDR__:    type = import;
    __FILETYPE__:  type = weak, value = $00FF; # ProDOS SYS
    __STACKSIZE__: type = weak, value = $0600; # 1.5k stack — frees BSS room in the
                                               # tight $6000-$9600 DHGR layout (the
                                               # turn-based game's call depth is shallow)
    __LCADDR__:    type = weak, value = $D400;
    __LCSIZE__:    type = weak, value = $0C00;
}
MEMORY {
    ZP:     file = "", define = yes, start = $0080,         size = $001A;
    HEADER: file = %O,               start = $2000 - $003A, size = $003A;
    MAIN:   file = %O, define = yes, start = $2000,         size = $9600 - $2000;
    BSS:    file = "",               start = __ONCE_RUN__,  size = $9600 - __STACKSIZE__ - __ONCE_RUN__;
    LC:     file = "", define = yes, start = __LCADDR__,    size = __LCSIZE__;
}
SEGMENTS {
    ZEROPAGE: load = ZP,             type = zp;
    EXEHDR:   load = HEADER,         type = ro,  optional = yes;
    STARTUP:  load = MAIN,           type = ro;
    LOWCODE:  load = MAIN,           type = ro,  optional = yes;
    CODE:     load = MAIN,           type = ro,  start = $6000;
    RODATA:   load = MAIN,           type = ro;
    DATA:     load = MAIN,           type = rw;
    INIT:     load = MAIN,           type = rw;
    ONCE:     load = MAIN,           type = ro,  define   = yes;
    LC:       load = MAIN, run = LC, type = ro,  optional = yes;
    BSS:      load = BSS,            type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
